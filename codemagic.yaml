workflows:
  android-debug:
    name: Build Android APK
    max_build_duration: 20

    scripts:
      - name: Prepare files
        script: |
          set -e

          echo "Current files:"
          find . -maxdepth 4 -type f | sort

          mkdir -p work

          if [ -f android_payment_forwarder.zip ]; then
            echo "Unzipping android_payment_forwarder.zip"
            unzip -o android_payment_forwarder.zip -d work
          fi

          if [ -f bdx_payment_app_ready.zip ]; then
            echo "Unzipping bdx_payment_app_ready.zip"
            unzip -o bdx_payment_app_ready.zip -d work
          fi

          rm -rf app
          mkdir -p app/src/main/java/com/sohag/paymentforwarder
          mkdir -p app/src/main/res/values

          MANIFEST=$(find . -name AndroidManifest.xml | head -n 1)
          STYLES=$(find . -name styles.xml | head -n 1)
          MAIN=$(find . -name MainActivity.java | head -n 1)
          FORWARDER=$(find . -name PaymentForwarder.java | head -n 1)
          RECEIVER=$(find . -name SmsReceiver.java | head -n 1)

          echo "Manifest: $MANIFEST"
          echo "Styles: $STYLES"
          echo "MainActivity: $MAIN"
          echo "PaymentForwarder: $FORWARDER"
          echo "SmsReceiver: $RECEIVER"

          test -n "$MANIFEST"
          test -n "$STYLES"
          test -n "$MAIN"
          test -n "$FORWARDER"
          test -n "$RECEIVER"

          cp "$MANIFEST" app/src/main/AndroidManifest.xml
          cp "$STYLES" app/src/main/res/values/styles.xml
          cp "$MAIN" app/src/main/java/com/sohag/paymentforwarder/MainActivity.java
          cp "$FORWARDER" app/src/main/java/com/sohag/paymentforwarder/PaymentForwarder.java
          cp "$RECEIVER" app/src/main/java/com/sohag/paymentforwarder/SmsReceiver.java

          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'PaymentForwarder'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.sohag.paymentforwarder'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.sohag.paymentforwarder'
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          echo "Final app files:"
          find app -type f | sort

      - name: Build APK
        script: |
          set -e
          gradle assembleDebug --no-daemon

    artifacts:
      - app/build/outputs/**/*.apk
      - "**/*.apk"
