workflows:
  android-debug:
    name: Build Android APK
    max_build_duration: 20
    scripts:
      - name: Create Android project
        script: |
          mkdir -p app/src/main/java/com/sohag/paymentforwarder
          mkdir -p app/src/main/res/values

          MANIFEST=$(find . -name AndroidManifest.xml | head -n 1)
          STYLES=$(find . -name styles.xml | head -n 1)
          MAIN=$(find . -name MainActivity.java | head -n 1)
          FORWARDER=$(find . -name PaymentForwarder.java | head -n 1)
          RECEIVER=$(find . -name SmsReceiver.java | head -n 1)

          echo "Manifest: $MANIFEST"
          echo "Styles: $STYLES"
          echo "MainActivity: $MAIN"
          echo "PaymentForwarder: $FORWARDER"
          echo "SmsReceiver: $RECEIVER"

          cp "$MANIFEST" app/src/main/AndroidManifest.xml
          cp "$STYLES" app/src/main/res/values/styles.xml
          cp "$MAIN" app/src/main/java/com/sohag/paymentforwarder/MainActivity.java
          cp "$FORWARDER" app/src/main/java/com/sohag/paymentforwarder/PaymentForwarder.java
          cp "$RECEIVER" app/src/main/java/com/sohag/paymentforwarder/SmsReceiver.java

          cat > settings.gradle <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'PaymentForwarder'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.sohag.paymentforwarder'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.sohag.paymentforwarder'
                  minSdk 23
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

      - name: Build APK
        script: |
          gradle assembleDebug --no-daemon

    artifacts:
      - app/build/outputs/apk/debug/*.apk
